// ---- Spec-Reality Sync ----
function syncSpecs() {
    if (!selectedProjectId) { toast('No project selected', 'error'); return; }
    var el = document.getElementById('sync-results');
    el.style.display = 'block';
    el.innerHTML = '<div class="empty-state"><p>Comparing specs against codebase...</p><p style="font-size:12px;color:var(--text-dim)">This may take 30-60 seconds</p></div>';
    api('/projects/' + selectedProjectId + '/sync-specs', { method: 'POST', body: '{}' })
        .then(function(data) {
            if (data.status === 'error') {
                el.innerHTML = '<div class="card" style="border-color:var(--red)"><p>Sync failed: ' + escapeHtml(data.message || '') + '</p></div>';
                return;
            }
            renderSyncResults(data.sync);
        })
        .catch(function(err) {
            el.innerHTML = '<div class="card" style="border-color:var(--red)"><p>Error: ' + escapeHtml(err.message) + '</p></div>';
        });
}

function renderSyncResults(sync) {
    var el = document.getElementById('sync-results');
    var score = sync.alignment_score || 0;
    var scoreColor = score >= 80 ? 'var(--green)' : score >= 50 ? 'var(--yellow, orange)' : 'var(--red)';
    var html = '<div class="card" style="margin-bottom:12px">' +
        '<div class="card-header"><span class="card-title">Spec-Reality Sync</span>' +
        '<span style="font-size:18px;font-weight:bold;color:' + scoreColor + '">' + score + '%</span>' +
        '<button class="btn-outline" style="font-size:11px;padding:2px 8px;margin-left:8px" onclick="document.getElementById(\'sync-results\').style.display=\'none\'">Dismiss</button></div>' +
        '<p style="font-size:12px;margin:8px 0">' + escapeHtml(sync.summary || '') + '</p>';

    if (sync.uncovered_features && sync.uncovered_features.length) {
        html += '<h4 style="font-size:12px;color:var(--accent);margin:12px 0 4px">Uncovered Features (in code, no spec)</h4><ul style="font-size:12px;margin:0;padding-left:16px">';
        sync.uncovered_features.forEach(function(f) {
            html += '<li><strong>' + escapeHtml(f.feature) + '</strong> — ' + escapeHtml(f.evidence) +
                (f.suggested_spec ? ' <span style="color:var(--text-dim)">→ ' + escapeHtml(f.suggested_spec) + '</span>' : '') + '</li>';
        });
        html += '</ul>';
    }

    if (sync.stale_specs && sync.stale_specs.length) {
        html += '<h4 style="font-size:12px;color:var(--red);margin:12px 0 4px">Stale Specs (no matching code)</h4><ul style="font-size:12px;margin:0;padding-left:16px">';
        sync.stale_specs.forEach(function(s) {
            html += '<li><strong>' + escapeHtml(s.spec) + '</strong> — ' + escapeHtml(s.issue) + '</li>';
        });
        html += '</ul>';
    }

    if (sync.mismatches && sync.mismatches.length) {
        html += '<h4 style="font-size:12px;color:var(--yellow, orange);margin:12px 0 4px">Mismatches</h4><ul style="font-size:12px;margin:0;padding-left:16px">';
        sync.mismatches.forEach(function(m) {
            html += '<li><strong>' + escapeHtml(m.spec) + '</strong>: spec says "' + escapeHtml(m.claim) + '" but code shows "' + escapeHtml(m.reality) + '"</li>';
        });
        html += '</ul>';
    }

    if (sync.suggestions && sync.suggestions.length) {
        html += '<h4 style="font-size:12px;margin:12px 0 4px">Suggestions</h4><ul style="font-size:12px;margin:0;padding-left:16px">';
        sync.suggestions.forEach(function(s) {
            html += '<li>' + escapeHtml(s) + '</li>';
        });
        html += '</ul>';
    }

    html += '</div>';
    el.innerHTML = html;
}

// ---- Review ----
function loadReview() {
    api('/drafts').then(function(data) {
        var el = document.getElementById('drafts-list');
        var activeDrafts = data.drafts.filter(function(d) { return d.status === 'pending_answers'; });
        var navBtns = document.querySelectorAll('nav button');
        navBtns.forEach(function(b) { if (b.textContent.trim().toLowerCase().replace(/\s*\(\d+\)$/, '') === 'review') b.textContent = activeDrafts.length ? 'Review (' + activeDrafts.length + ')' : 'Review'; });
        if (!activeDrafts.length) { el.innerHTML = '<div class="empty-state">No reviews pending</div>'; return; }
        el.innerHTML = activeDrafts.map(function(d) {
            var statusBadge = d.status === 'pending_answers' ? 'badge-waiting' : d.status === 'answered' ? 'badge-pass' : d.status === 'resumed' ? 'badge-running' : 'badge-queued';
            var questionsHtml = '';
            if (d.questions && d.questions.length) {
                questionsHtml = '<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Draft &rarr; Q&amp;A rounds &rarr; Approve as Final &rarr; Ready for build</div>';
                questionsHtml += '<div class="draft-questions">';
                d.questions.forEach(function(q, idx) {
                    var isStructured = typeof q === 'object' && q.options && q.options.length;
                    questionsHtml += '<div class="draft-question-block">';
                    if (isStructured) {
                        questionsHtml += '<h4>Q' + (idx+1) + '/' + d.questions.length + ': ' + escapeHtml(q.title || '') + '</h4>';
                        questionsHtml += '<p>' + escapeHtml(q.question || '') + '</p>';
                        q.options.forEach(function(opt) {
                            var rec = opt.recommended ? ' recommended' : '';
                            questionsHtml += '<label class="draft-option' + rec + '"><input type="radio" name="draft-' + d.id + '-q' + idx + '" value="' + escapeHtml(opt.label) + ': ' + escapeHtml(opt.text) + '"' + (opt.recommended ? ' checked' : '') + '><span>' + escapeHtml(opt.label) + ') ' + escapeHtml(opt.text) + (opt.recommended ? ' [recommended]' : '') + '</span></label>';
                        });
                    } else {
                        var qText = typeof q === 'string' ? q : (q.question || q.title || JSON.stringify(q));
                        questionsHtml += '<p><strong>Q' + (idx+1) + ':</strong> ' + escapeHtml(qText) + '</p>';
                        questionsHtml += '<textarea class="draft-textarea" style="height:60px" id="draft-' + d.id + '-free-' + idx + '" placeholder="Your answer..."></textarea>';
                    }
                    questionsHtml += '</div>';
                });
                questionsHtml += '</div>';
            }
            var answerForm = d.status === 'pending_answers'
                ? '<div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-small" onclick="submitDraftAnswer(' + d.id + ',' + d.questions.length + ')">Submit Answers</button></div>'
                : '';
            return '<div class="card"><div class="card-header"><span class="card-title">Spec ' + escapeHtml(d.spec_number) + ': ' + escapeHtml(d.spec_title) + ' (v0.' + d.version + ')</span><span class="badge ' + statusBadge + '">' + escapeHtml(d.status) + '</span></div>' + questionsHtml + answerForm + '</div>';
        }).join('');
    }).catch(function() {});
}

function submitDraftAnswer(draftId, questionCount) {
    var answers = [];
    for (var i = 0; i < questionCount; i++) {
        var selected = document.querySelector('input[name="draft-' + draftId + '-q' + i + '"]:checked');
        if (selected) { answers.push(selected.value); continue; }
        var textarea = document.getElementById('draft-' + draftId + '-free-' + i);
        if (textarea && textarea.value.trim()) { answers.push(textarea.value.trim()); continue; }
        toast('Please answer question ' + (i+1), 'warn');
        return;
    }
    api('/drafts/' + draftId + '/answer', { method: 'POST', body: JSON.stringify({ answers: answers }) })
        .then(function(data) { toast(data.message || 'Answers submitted', 'success'); loadReview(); })
        .catch(function(err) { toast('Error: ' + err.message, 'error'); });
}

// ---- History ----
function loadHistory() {
    api('/history/tasks' + projectParam()).then(function(data) {
        var el = document.getElementById('history-list');
        if (!data.results.length) { el.innerHTML = '<div class="empty-state">No history yet</div>'; return; }
        el.innerHTML = '<table>'
            + '<thead><tr><th>Spec</th><th>Task</th><th>Verdict</th><th>Feedback</th><th>Status</th><th>User Notes</th><th>Diff</th><th>Date</th></tr></thead>'
            + '<tbody>'
            + data.results.map(function(r) {
                var specLabel = r.spec_number ? escapeHtml(r.spec_number) + ': ' + escapeHtml(r.spec_title || '') : 'Task #' + r.task_id;
                var taskLabel = r.done_when_item === '__draft_review__' ? 'Draft Review' : escapeHtml((r.done_when_item || '').substring(0, 150));
                var verdictBadge = r.adversarial_verdict ? '<span class="badge badge-' + (r.adversarial_verdict === 'PASS' ? 'pass' : 'fail') + '">' + r.adversarial_verdict + '</span>' : '<span class="badge badge-queued">\u2014</span>';
                var feedback = '';
                if (r.adversarial_report && typeof r.adversarial_report === 'object') {
                    var rpt = r.adversarial_report;
                    var cw = 0, gw = 0;
                    (rpt.issues || []).forEach(function(i) { if (i.final_side === 'author') cw++; else if (i.final_side === 'challenger') gw++; });
                    feedback = 'Claude ' + cw + ' \u2014 ' + gw + ' Gemini';
                }
                var statusBadge = r.approved === true ? '<span class="badge badge-pass">Approved</span>' : r.approved === false ? '<span class="badge badge-fail">Rejected</span>' : '<span class="badge badge-pending">Pending</span>';
                var userNotes = r.reject_reason ? escapeHtml(r.reject_reason) : '\u2014';
                var diffLink = r.diff_summary ? '<span class="diff-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">View diff</span><div style="display:none" class="diff-area">' + escapeHtml(r.diff_summary) + '</div>' : '\u2014';
                var date = r.created_at ? new Date(r.created_at).toLocaleDateString() : '\u2014';
                return '<tr><td>' + specLabel + '</td><td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + taskLabel + '</td><td>' + verdictBadge + '</td><td style="font-size:11px;color:var(--text-dim);max-width:200px">' + feedback + '</td><td>' + statusBadge + '</td><td style="font-size:11px;max-width:150px">' + userNotes + '</td><td>' + diffLink + '</td><td style="font-size:11px;color:var(--text-dim)">' + date + '</td></tr>';
            }).join('')
            + '</tbody></table>';
    }).catch(function() {});
}

// ---- Health ----
function loadHealth() {
    Promise.all([
        api('/health/ground-truth'),
        api('/health/drift'),
        api('/health/deployment'),
    ]).then(function(results) {
        renderHealthSummary(results[0]);
        renderHealthSpecs(results[0]);
        renderDriftSignals(results[1]);
        renderDeployment(results[2]);
    }).catch(function(e) {
        document.getElementById('health-summary').innerHTML = '<div class="empty-state">Failed to load health data</div>';
    });
}

function renderHealthSummary(data) {
    var el = document.getElementById('health-summary');
    el.innerHTML = '<div style="display:flex;gap:16px;flex-wrap:wrap">'
        + _healthCard('Total Specs', data.total_specs, '')
        + _healthCard('Spec Checked', data.total_spec_checked, 'badge-pass')
        + _healthCard('Dashboard Aware', data.total_dashboard_aware, data.total_dashboard_aware < data.total_spec_checked ? 'badge-fail' : 'badge-pass')
        + _healthCard('Mismatches', data.mismatch_count, data.mismatch_count > 0 ? 'badge-fail' : 'badge-pass')
        + '</div>';
    document.getElementById('health-timestamp').textContent = data.scan_timestamp ? 'Scanned: ' + new Date(data.scan_timestamp).toLocaleTimeString() : '';
}

function _healthCard(label, value, badgeClass) {
    return '<div style="background:var(--card-bg,#1a1a1a);border:1px solid var(--border);border-radius:8px;padding:12px 20px;min-width:120px;text-align:center">'
        + '<div style="font-size:24px;font-weight:bold">' + (badgeClass ? '<span class="badge ' + badgeClass + '" style="font-size:20px;padding:4px 12px">' + value + '</span>' : value) + '</div>'
        + '<div style="color:var(--text-dim);font-size:12px;margin-top:4px">' + label + '</div></div>';
}

function renderHealthSpecs(data) {
    var el = document.getElementById('health-specs');
    if (!data.specs.length) { el.innerHTML = '<div class="empty-state">No specs found</div>'; return; }

    // Group by band
    var bands = {};
    data.specs.forEach(function(s) {
        if (!bands[s.band]) bands[s.band] = [];
        bands[s.band].push(s);
    });

    var html = '';
    var bandOrder = ['vision', 'foundation', 'mvp', 'v1', 'v2', 'backlog'];
    bandOrder.forEach(function(band) {
        if (!bands[band]) return;
        html += '<h3 style="margin:16px 0 8px;text-transform:capitalize">' + escapeHtml(band) + '</h3>';
        bands[band].forEach(function(s) {
            var pct = s.spec_total > 0 ? Math.round(s.spec_ratio * 100) : 0;
            var barColor = s.has_mismatch ? 'var(--orange)' : 'var(--green)';
            var statusBadge = '<span class="badge badge-' + s.status + '">' + s.status + '</span>';
            var mismatchNote = s.has_mismatch
                ? ' <span style="color:var(--orange);font-size:12px">(' + s.untracked_items.length + ' untracked)</span>'
                : '';
            html += '<div style="background:var(--card-bg,#1a1a1a);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">'
                + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
                + '<span><strong>' + escapeHtml(s.number) + '</strong>: ' + escapeHtml(s.title) + ' ' + statusBadge + '</span>'
                + '<span style="font-size:12px;color:var(--text-dim)">Spec: ' + s.spec_checked + '/' + s.spec_total + ' | DB: ' + s.dashboard_aware + mismatchNote + '</span>'
                + '</div>'
                + '<div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">'
                + '<div style="background:' + barColor + ';height:100%;width:' + pct + '%;transition:width 0.3s"></div>'
                + '</div></div>';
        });
    });
    el.innerHTML = html;
}

function renderDriftSignals(data) {
    var el = document.getElementById('health-drift');
    if (data.clean) { el.innerHTML = '<div style="color:var(--green);font-size:14px">No drift signals detected</div>'; return; }

    var severityBadge = { error: 'badge-fail', warning: 'badge-draft', info: 'badge-queued' };
    var html = '<h3 style="margin:0 0 8px">Drift Signals</h3>';
    data.items.forEach(function(item) {
        html += '<div style="background:var(--card-bg,#1a1a1a);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;gap:8px;align-items:center">'
            + '<span class="badge ' + (severityBadge[item.severity] || 'badge-queued') + '">' + item.severity + '</span>'
            + '<span>' + escapeHtml(item.description) + '</span>'
            + (item.spec_ref ? '<span style="color:var(--text-dim);font-size:12px">' + escapeHtml(item.spec_ref) + '</span>' : '')
            + '</div>';
    });
    el.innerHTML = html;
}

function renderDeployment(data) {
    var el = document.getElementById('health-deployment');
    if (data.deployed_commit === 'unknown' && data.latest_commit === 'unknown') {
        el.innerHTML = '<div style="color:var(--text-dim);font-size:12px">Deployment status unavailable</div>';
        return;
    }
    var statusColor = { current: 'var(--green)', stale: 'var(--orange)', outdated: 'var(--red)', unknown: 'var(--text-dim)' };
    var statusLabel = { current: 'Up to date', stale: 'Behind', outdated: 'Outdated', unknown: 'Unknown' };
    var color = statusColor[data.status] || 'var(--text-dim)';
    var label = statusLabel[data.status] || data.status;
    var behind = data.commits_behind !== null ? ' (' + data.commits_behind + ' commits behind)' : '';

    el.innerHTML = '<div style="background:var(--card-bg,#1a1a1a);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center">'
        + '<div><strong>Deployment</strong><span style="color:var(--text-dim);font-size:12px;margin-left:8px">Deployed: ' + escapeHtml((data.deployed_commit || '').substring(0, 7)) + ' | Latest: ' + escapeHtml((data.latest_commit || '').substring(0, 7)) + '</span></div>'
        + '<span style="color:' + color + ';font-weight:bold">' + label + behind + '</span>'
        + '</div>';
}

function healthSync() {
    toast('Syncing...', '');
    api('/health/sync', { method: 'POST', body: '{}' })
        .then(function(data) {
            toast('Synced: ' + data.imported + ' items imported', 'success');
            loadHealth();
        })
        .catch(function() { toast('Sync failed', 'error'); });
}

// ---- Toast ----
function toast(msg, type) {
    type = type || '';
    var el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }, 4000);
}

// ---- Helpers ----
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
